<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poké Community Overlay</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Inspired By the Pokemon Community Game please go give them your support!
    Contact: pokemoncommunitygame@gmail.com
    Twitch Extension: https://dashboard.twitch.tv/extensions/pm0qkv9g4h87t5y6lg329oam8j7ze9
    Discord: https://discord.gg/BvaNvMD
    Streamer Doc: https://docs.google.com/document/d/1DIrzYG1k7ztbUWJzp7I93GN0PliAaEFHJ0Wt_zazO4s/edit

    My Version's GitHub: https://github.com/Minepatcher/Pokemon-Community-Game-Spawn-Countdown/tree/main
    -->
    <fieldset id="fieldset">
      <legend id="legend"></legend>
      <img
        id="sprite-image"
        loading="lazy"
        src="https://dev.bframework.de/static/pokedex/sprites/question512.png"
      />
      <h1 id="countdown">00:00</h1>
    </fieldset>
    <audio
      id="audio-1"
      src="https://www.myinstants.com/media/sounds/wild-pokemon-battle.mp3"
      type="audio/mpeg"
    ></audio>
    <audio
      id="audio-2"
      src="https://www.myinstants.com/media/sounds/pokemon-redblueyellow-run-away-sound-effect.mp3"
      type="audio/mpeg"
    ></audio>
    <script src="./app.js"></script>
  </body>
</html>
